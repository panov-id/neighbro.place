<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NEIGHBRO — OG image template</title>
<link rel="stylesheet" href="../landing/fonts.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  #stage { position: relative; width: 1200px; height: 630px; }
  #stage svg.bg { position: absolute; inset: 0; display: block; }
  #brand {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 16px;
  }
  #logo { color: #c6a24e; }
  #logo svg { display: block; }
  #wordmark {
    font-family: 'Unbounded', sans-serif; font-weight: 900; text-transform: uppercase;
    letter-spacing: 0.04em; line-height: 0.95; font-size: 84px; color: #f2ede2;
  }
  #caption {
    font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    font-size: 16px; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500;
    padding-left: 0.28em; line-height: 2; color: #cfc2a6;
  }
  #caption .site { color: #c6a24e; font-weight: 700; }
</style>
</head>
<body>
<div id="stage">
  <svg class="bg" id="art" width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="brand">
    <div id="logo"></div>
    <div id="wordmark">NEIGHBRO</div>
    <div id="caption"></div>
  </div>
</div>

<script>
// Evening-courtyard photo OG (sibling of sosed.place/og): splash photo,
// cover-cropped, with a scrim vignette; ring+house logo, wordmark, caption.

const SVG = "http://www.w3.org/2000/svg";
function el(name, attrs, parent) {
  const node = document.createElementNS(SVG, name);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  if (parent) parent.appendChild(node);
  return node;
}

// The framed ring+house logo (same geometry as wallpapers/template.html).
function logoSvg(px) {
  return `<svg width="${px}" height="${px}" viewBox="0 0 96 96" fill="none" aria-hidden="true">
    <circle cx="48" cy="48" r="46" fill="none" stroke="currentColor" stroke-width="2.5"/>
    <g transform="translate(16.3,16.8) scale(0.88)">
      <path d="M36 4 L64 28 V57 H32 L20 67 V57 H8 V28 Z" fill="currentColor" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
      <rect x="22" y="32" width="18" height="5" rx="2.5" fill="#0d0b08"/>
      <rect x="22" y="43" width="27" height="5" rx="2.5" fill="#0d0b08"/>
    </g>
  </svg>`;
}

function draw(spec) {
  const { caption = ["THE ART OF BEING NEARBY", "NEIGHBRO.PLACE"] } = spec;
  const svg = document.getElementById("art");
  svg.innerHTML = "";
  const W = 1200, H = 630;
  const defs = el("defs", {}, svg);

  // Photo, cover-cropped.
  el("image", {
    href: "../landing/img/splash.jpg", x: 0, y: 0, width: W, height: H,
    preserveAspectRatio: "xMidYMid slice",
  }, svg);
  // Radial vignette centered on the text block…
  const vg = el("radialGradient", { id: "scrim", cx: "0.5", cy: "0.52", r: "0.75" }, defs);
  el("stop", { offset: "0", "stop-color": "#0d0b08", "stop-opacity": 0.66 }, vg);
  el("stop", { offset: "0.55", "stop-color": "#0d0b08", "stop-opacity": 0.4 }, vg);
  el("stop", { offset: "1", "stop-color": "#0d0b08", "stop-opacity": 0.16 }, vg);
  el("rect", { x: 0, y: 0, width: W, height: H, fill: "url(#scrim)" }, svg);
  // …plus a gentle bottom-up gradient so the caption zone is calm.
  const bg = el("linearGradient", { id: "scrimB", x1: 0, y1: 0, x2: 0, y2: 1 }, defs);
  el("stop", { offset: "0", "stop-color": "#0d0b08", "stop-opacity": 0 }, bg);
  el("stop", { offset: "0.6", "stop-color": "#0d0b08", "stop-opacity": 0.1 }, bg);
  el("stop", { offset: "1", "stop-color": "#0d0b08", "stop-opacity": 0.55 }, bg);
  el("rect", { x: 0, y: 0, width: W, height: H, fill: "url(#scrimB)" }, svg);

  document.getElementById("logo").innerHTML = logoSvg(spec.logoPx || 96);
  const cap = document.getElementById("caption");
  cap.innerHTML = "";
  const [tagline, site] = Array.isArray(caption) ? caption : [caption, null];
  cap.appendChild(Object.assign(document.createElement("div"), { textContent: tagline }));
  if (site) {
    const s = document.createElement("div");
    s.className = "site"; s.textContent = site;
    cap.appendChild(s);
  }
}

window.__render = (spec) => draw(spec || {});
draw({});
</script>
</body>
</html>
