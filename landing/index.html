<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>neighbro.place — coming soon</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #0a0a0a;
    --border: #0a0a0a;
    --muted: #555555;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0a0a0a; --fg: #ffffff; --border: #ffffff; --muted: #aaaaaa; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 12vh 24px 24px;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  p.pitch {
    color: var(--muted);
    line-height: 1.5;
    margin: 0 0 40px;
  }
  form {
    display: flex;
    gap: 8px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px;
  }
  input[type="email"] {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--fg);
    font-size: 1rem;
    padding: 10px 4px;
    outline: none;
  }
  input[type="email"]::placeholder { color: var(--muted); }
  button {
    border: 2px solid var(--border);
    background: var(--fg);
    color: var(--bg);
    font-size: 1rem;
    padding: 10px 20px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .note {
    margin-top: 16px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .status {
    margin-top: 20px;
    font-size: 0.95rem;
    min-height: 1.2em;
  }
  .status.ok { color: #1a7f37; }
  .status.err { color: #b3261e; }
</style>
</head>
<body>
<div class="wrap">
  <h1>neighbro.place</h1>
  <p class="pitch">A place for talking to the people around you, right now, and then letting it go. No profile, no feed you scroll back through for years. We're launching soon — leave your email to get in early.</p>

  <form id="waitlist-form">
    <input type="email" id="email" name="email" placeholder="your email" required autocomplete="email">
    <button type="submit" id="submit-btn">Count me in</button>
  </form>
  <div class="note">Early waitlist joiners get premium early-user status.</div>
  <div class="status" id="status"></div>
</div>

<script>
  // TODO: fill in once the real Supabase project exists.
  const SUPABASE_URL = "https://YOUR-PROJECT.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR-ANON-KEY";
  const TABLE = "waitlist";

  const form = document.getElementById("waitlist-form");
  const status = document.getElementById("status");
  const btn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    if (!email) return;

    btn.disabled = true;
    status.textContent = "";
    status.className = "status";

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          email,
          source: "neighbro.place-landing",
          early_access: true
        })
      });

      if (!res.ok) throw new Error("request failed");

      status.textContent = "Done — you're on the list.";
      status.className = "status ok";
      form.reset();
    } catch (err) {
      status.textContent = "Couldn't submit that. Try again in a bit.";
      status.className = "status err";
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
