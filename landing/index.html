<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- CSP: strictly same-origin. Fonts are self-hosted, so no external hosts are
     needed. Supabase is reached same-origin through the gateway (/rest, /auth…),
     so connect-src 'self' covers the waitlist + push fetches. Inline
     scripts/styles are used, hence 'unsafe-inline'. If a deploy ever points
     config.js at a cross-origin Supabase host, add it to connect-src. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://api.dev.neighbro.panov.id https://api.uat.neighbro.panov.id https://api.neighbro.place https://*.supabase.co; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
<title>NEIGHBRO.PLACE — Good neighbors. Real moments.</title>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0c0b09">
<script>
  // Resolve theme before first paint (no flash on the splash):
  //  - light/dark from the OS default (prefers-color-scheme) unless the user has chosen it;
  //  - accent: the user's saved choice, otherwise a random one that differs from last visit.
  (function () {
    var ACC = ["", "crimson", "teal", "azure", "violet"];
    var d = document.documentElement;
    var m = localStorage.getItem("nb-mode");
    if (!m) m = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
    if (m === "light") d.setAttribute("data-mode", "light");
    var saved = localStorage.getItem("nb-accent"), chosen = saved !== null, ai;
    if (chosen) { ai = parseInt(saved, 10) || 0; }
    else {
      var prev = parseInt(localStorage.getItem("nb-accent-prev"), 10);
      do { ai = Math.floor(Math.random() * ACC.length); } while (ACC.length > 1 && ai === prev);
      localStorage.setItem("nb-accent-prev", String(ai));
    }
    if (ACC[ai]) d.setAttribute("data-theme", ACC[ai]);
    sessionStorage.setItem("nb-accent-active", String(ai));
    var tc = document.querySelector('meta[name="theme-color"]');
    if (tc) tc.setAttribute("content", m === "light" ? "#e9e6dd" : "#0c0b09");
    window.__nb = { accentIndex: ai, accentChosen: chosen, ACC: ACC };
  })();
</script>
<!-- Self-hosted fonts (see scripts/fetch-fonts.sh). Preload the above-the-fold
     latin faces (body + display), then the full @font-face set. -->
<link rel="preload" as="font" type="font/woff2" href="fonts/q5uCsoe9Lv5t7Meb31EcExN8hA.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="fonts/Yq6W-LOTXCb04q32xlpwu8Zf.woff2" crossorigin>
<link rel="stylesheet" href="fonts.css">
<style>
  :root {
    --bg: #0c0b09;
    --panel: #14120e;
    --panel-2: #26221a;
    --border: #3a331f;
    --fg: #ede8dd;
    --muted: #8a8172;
    --muted-2: #928979; /* raised to meet 4.5:1 on the dark ground */
    --accent: #c6a24e;
    --accent-ink: #1a1509;
    --err: #ff8a80;
    --ok: #9ecb7a;
  }
  /* Light mode — dark text + hard dark borders on a light concrete ground (accent untouched). */
  [data-mode="light"] {
    --bg: #e9e6dd; --panel: #f4f1e8; --panel-2: #ded9cc;
    --border: #1e1b14; --fg: #181510; --muted: #5f5a4e; --muted-2: #5c5749; /* darkened to meet 4.5:1 on the light ground */
  }
  /* Accent themes — a curated subset, cycled by clicking the logo. */
  [data-theme="crimson"] { --accent: #e0342b; --accent-ink: #fdeceb; }
  [data-theme="teal"]    { --accent: #1fb39a; --accent-ink: #04201c; }
  [data-theme="azure"]   { --accent: #3d84d6; --accent-ink: #eaf2ff; }
  [data-theme="violet"]  { --accent: #9b5de5; --accent-ink: #f3ecfd; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Keyboard focus must be visible on every interactive element. */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  /* The email field is borderless inside a pill, so show focus on the pill. */
  form.waitlist-form input[type="email"]:focus-visible { outline: none; }
  form.waitlist-form:focus-within { outline: 2px solid var(--accent); outline-offset: 2px; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Golos Text", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
  .mono {
    font-family: "JetBrains Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 0.72rem;
  }
  .accent { color: var(--accent); }

  /* Splash — accent ground overtaken by a circle of the main color; logo + brand in the center. */
  .splash { position: fixed; inset: 0; z-index: 90; display: grid; place-items: center; background: var(--accent); overflow: hidden; }
  .splash.done { animation: splashout .45s ease forwards; pointer-events: none; }
  @keyframes splashout { to { opacity: 0; visibility: hidden; } }
  .splash .disc { position: absolute; width: 160vmax; height: 160vmax; border-radius: 50%; background: var(--bg); transform: scale(0); animation: discgrow .8s cubic-bezier(.7,0,.3,1) forwards; }
  @keyframes discgrow { to { transform: scale(1); } }
  .splash .bm { position: relative; text-align: center; opacity: 0; animation: bmin .55s ease .5s forwards; }
  @keyframes bmin { from { opacity: 0; transform: translateY(12px) scale(.95); } to { opacity: 1; transform: none; } }
  .splash .s-logo { width: 84px; height: 84px; color: var(--accent); display: block; margin: 0 auto; }
  .splash .s-name { font-family: "Unbounded", sans-serif; font-weight: 900; font-size: clamp(1.8rem, 8vw, 2.6rem); text-transform: uppercase; color: var(--fg); margin-top: 16px; letter-spacing: 0.04em; }
  .splash .s-by { font-family: "JetBrains Mono", monospace; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.64rem; color: var(--muted); margin-top: 10px; }
  .splash .s-by b { color: var(--accent); font-weight: 400; }
  @media (prefers-reduced-motion: reduce) {
    /* Neutralize all motion: no infinite pulse, no animated hover transforms. */
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    /* Land the splash on its final state; stop the pulsing dot outright. */
    .splash .disc { animation: none; transform: scale(1); }
    .splash .bm { animation: none; opacity: 1; }
    .dot { animation: none; }
  }

  header.top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .mark {
    width: 34px; height: 34px; color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; padding: 0; cursor: pointer;
    transition: transform .3s cubic-bezier(.2,.8,.2,1);
  }
  .brand .mark:hover { transform: rotate(-6deg) scale(1.06); }
  .brand .mark:active { transform: scale(.92); }
  .icon-btn {
    background: transparent; color: var(--muted); cursor: pointer;
    border: 1px solid var(--border); width: 34px; height: 32px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: border-color .15s, color .15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn .moon { display: none; }
  [data-mode="light"] .icon-btn .sun { display: none; }
  [data-mode="light"] .icon-btn .moon { display: inline; }
  .brand .name {
    font-family: "Unbounded", sans-serif; font-weight: 800;
    letter-spacing: 0.02em; font-size: 1rem;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  header.top .tagline { color: var(--muted); font-size: 0.66rem; }
  .lang-select {
    background: transparent; color: var(--muted); cursor: pointer;
    border: 1px solid var(--border); height: 32px; padding: 0 8px 0 10px; flex-shrink: 0;
    font-family: "JetBrains Mono", monospace; text-transform: uppercase;
    letter-spacing: 0.1em; font-size: 0.68rem;
  }
  .lang-select:hover { border-color: var(--accent); color: var(--accent); }

  .hero { text-align: center; padding: 84px 0 12px; }
  .hero .eyebrow { color: var(--accent); margin-bottom: 26px; }
  h1 {
    font-family: "Unbounded", sans-serif; font-weight: 900;
    font-size: clamp(1.9rem, 7vw, 4.6rem); line-height: 0.98;
    letter-spacing: -0.01em; text-transform: uppercase;
    overflow-wrap: break-word;
  }
  h1 .outline {
    color: var(--accent); /* fallback: visible if text-stroke is unsupported */
    -webkit-text-stroke: 1.4px var(--accent);
    display: block;
  }
  /* Where the stroke renders, hollow the fill out. */
  @supports (-webkit-text-stroke: 1px currentColor) {
    h1 .outline { color: transparent; }
  }
  .hero p.sub {
    max-width: 520px; margin: 30px auto 0; color: var(--muted);
    font-size: 1.12rem; line-height: 1.5;
  }

  form.waitlist-form {
    display: flex; max-width: 460px; margin: 44px auto 0;
    border: 1px solid var(--border);
  }
  form.waitlist-form input[type="email"] {
    flex: 1; min-width: 0; border: none; outline: none;
    background: transparent; color: var(--fg);
    font-family: "Golos Text", sans-serif; font-size: 1rem; padding: 18px 20px;
  }
  form.waitlist-form input::placeholder { color: var(--muted-2); }
  form.waitlist-form button {
    border: none; cursor: pointer;
    background: var(--accent); color: var(--accent-ink);
    font-family: "JetBrains Mono", monospace; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.8rem;
    padding: 0 28px;
  }
  form.waitlist-form button:disabled { opacity: 0.55; cursor: default; }
  .note { margin-top: 18px; color: var(--muted-2); }
  .status { margin-top: 16px; min-height: 1.2em; font-size: 0.95rem; }
  .status.err { color: var(--err); }
  .status.ok { color: var(--ok); }

  .after { max-width: 460px; margin: 40px auto 0; display: none; }
  .after.show { display: block; }
  .after h3 {
    font-family: "Unbounded", sans-serif; font-weight: 800;
    text-transform: uppercase; font-size: 1.1rem; margin-bottom: 6px;
  }
  .after p { color: var(--muted); margin-bottom: 20px; }
  .after .cta-row { display: flex; flex-direction: column; gap: 12px; }
  .btn {
    display: block; text-align: center; text-decoration: none; cursor: pointer;
    font-family: "JetBrains Mono", monospace; text-transform: uppercase;
    letter-spacing: 0.14em; font-size: 0.8rem; padding: 16px;
  }
  .btn-primary { background: var(--accent); color: var(--accent-ink); border: none; }
  .btn-ghost { background: transparent; color: var(--fg); border: 1px solid var(--border); }
  .btn[hidden] { display: none; }

  .divider {
    display: flex; align-items: center; gap: 22px;
    margin: 88px 0 64px; color: var(--accent);
  }
  .divider::before, .divider::after {
    content: ""; height: 1px; background: var(--border); flex: 1;
  }

  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
  .step { padding: 0 34px; border-left: 1px solid var(--border); }
  .step:first-child { border-left: none; padding-left: 0; }
  .step .k { color: var(--accent); margin-bottom: 18px; }
  .step h2 {
    font-family: "Unbounded", sans-serif; font-weight: 800;
    text-transform: uppercase; font-size: 1.18rem; line-height: 1.15; margin-bottom: 14px;
  }
  .step p { color: var(--muted); line-height: 1.5; }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(198,162,78,0.5); }
    70% { box-shadow: 0 0 0 10px rgba(198,162,78,0); }
    100% { box-shadow: 0 0 0 0 rgba(198,162,78,0); }
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
    box-shadow: 0 0 0 0 rgba(198,162,78,0.6); animation: pulse 2.4s infinite;
  }

  /* Device mockups — live app UI, recolors with theme */
  .mockups { margin: 24px 0 10px; }
  .mock-stage { position: relative; width: 720px; max-width: 100%; margin: 0 auto; min-height: 520px; }
  .mock-cap { text-align: center; color: var(--accent); margin-top: 30px; }

  .device-wide {
    position: absolute; left: 0; top: 26px; width: 452px; max-width: 64%;
    border: 2px solid var(--border); background: var(--panel);
    box-shadow: 14px 14px 0 rgba(0,0,0,0.4);
  }
  .dw-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 2px solid var(--border); color: var(--muted); }
  .dw-body { display: grid; grid-template-columns: 1fr 210px; min-height: 330px; }
  .dw-feed { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .dw-card { border: 2px solid var(--border); background: var(--bg); padding: 12px 14px; box-shadow: 4px 4px 0 rgba(0,0,0,0.4); }
  .dw-card p { line-height: 1.35; margin-bottom: 8px; font-size: 0.92rem; }
  .dw-meta { color: var(--muted-2); font-size: 0.56rem; letter-spacing: 0.1em; }
  .dw-meta .ppl { color: var(--accent); }
  .dw-chat { border-left: 2px solid var(--border); padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .dw-chat-h { color: var(--accent); font-size: 0.54rem; margin-bottom: 4px; }
  .bub { border: 2px solid var(--border); padding: 8px 10px; font-size: 0.78rem; line-height: 1.3; max-width: 92%; }
  .bub.them { align-self: flex-start; background: var(--panel-2); box-shadow: 3px 3px 0 rgba(0,0,0,0.4); }
  .bub.me { align-self: flex-end; background: var(--accent); color: var(--accent-ink); border-color: var(--accent); box-shadow: -3px 3px 0 rgba(0,0,0,0.4); }

  .device-phone {
    position: absolute; right: 0; top: 0; z-index: 2; width: 288px;
    border: 3px solid var(--fg); border-radius: 42px; background: var(--bg); padding: 12px;
    box-shadow: 16px 16px 0 var(--accent);
  }
  .p-screen { border: 2px solid var(--border); border-radius: 30px; overflow: hidden; background: var(--bg); }
  .p-top { display: flex; align-items: center; gap: 8px; padding: 14px 15px 12px; border-bottom: 2px solid var(--border); color: var(--fg); font-size: 0.6rem; }
  .p-top .p-logo { width: 20px; height: 20px; color: var(--accent); display: inline-flex; }
  .p-top .p-name { font-family: "Unbounded", sans-serif; font-weight: 800; letter-spacing: 0.02em; }
  .p-top .p-live { margin-left: auto; display: inline-flex; align-items: center; gap: 6px; color: var(--accent); }
  .p-feed { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .p-card { border: 2px solid var(--border); background: var(--panel); padding: 12px 13px; box-shadow: 4px 4px 0 rgba(0,0,0,0.45); }
  .p-card.r1 { transform: rotate(-1deg); }
  .p-card.r2 { transform: rotate(1deg); }
  .p-card p { line-height: 1.34; font-size: 0.86rem; margin-bottom: 8px; }
  .p-meta { display: flex; align-items: center; gap: 12px; color: var(--muted-2); font-size: 0.54rem; letter-spacing: 0.08em; }
  .p-meta .ppl { color: var(--accent); }
  .p-meta .plus { margin-left: auto; color: var(--accent); border: 1px solid var(--border); width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
  .p-nav { display: flex; border-top: 2px solid var(--border); }
  .p-nav span { flex: 1; text-align: center; padding: 12px 2px; font-size: 0.5rem; letter-spacing: 0.08em; color: var(--muted); border-right: 2px solid var(--border); text-transform: uppercase; }
  .p-nav span:last-child { border-right: none; }
  .p-nav span.on { background: var(--accent); color: var(--accent-ink); }
  @media (max-width: 820px) {
    .device-wide { display: none; }
    .device-phone { position: static; margin: 0 auto; }
    .mock-stage { min-height: 0; }
  }

  /* Features — why it feels different */
  .features { margin: 84px 0 30px; }
  .feat-eyebrow { color: var(--accent); margin-bottom: 30px; text-align: center; }
  .feat-grid { display: grid; grid-template-columns: repeat(2, 1fr); border: 2px solid var(--border); }
  .feat { padding: 30px 32px; border-right: 2px solid var(--border); border-bottom: 2px solid var(--border); }
  .feat:nth-child(2n) { border-right: none; }
  .feat:nth-child(n+3) { border-bottom: none; }
  .feat h3 {
    font-family: "Unbounded", sans-serif; font-weight: 800; text-transform: uppercase;
    font-size: 1.02rem; line-height: 1.16; margin-bottom: 12px;
  }
  .feat p { color: var(--muted); line-height: 1.5; }
  @media (max-width: 760px) {
    .feat-grid { grid-template-columns: 1fr; }
    .feat { border-right: none; border-bottom: 2px solid var(--border); }
    .feat:last-child { border-bottom: none; }
  }

  .moments {
    margin: 74px 0; border: 1px solid var(--border); background: var(--panel);
    padding: 40px; display: flex; align-items: center; justify-content: space-between; gap: 30px;
  }
  .moments .label { color: var(--muted-2); margin-bottom: 22px; }
  .tags { display: flex; flex-wrap: wrap; gap: 12px; max-width: 620px; }
  .tag {
    border: 1px solid var(--border); background: var(--panel-2); color: var(--fg);
    padding: 12px 18px; font-size: 0.95rem;
  }
  .moments .timer { text-align: right; flex-shrink: 0; }
  .moments .timer .big {
    font-family: "Unbounded", sans-serif; font-weight: 900;
    font-size: 3.2rem; color: var(--accent); line-height: 1;
  }
  .moments .timer .cap { color: var(--muted-2); margin-top: 8px; }

  .closing { text-align: center; padding: 40px 0 20px; }
  .closing h2 {
    font-family: "Unbounded", sans-serif; font-weight: 900;
    text-transform: uppercase; font-size: clamp(1.8rem, 5vw, 3rem); line-height: 1.02;
  }
  .closing h2 .accent { display: block; }

  footer.bottom {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 14px 24px;
    padding: 34px 0; margin-top: 60px; border-top: 1px solid var(--border);
    color: var(--muted-2);
  }
  footer.bottom a { color: var(--muted-2); text-decoration: none; }
  footer.bottom a:hover { color: var(--accent); }
  .footer-links { display: flex; gap: 16px 20px; flex-wrap: wrap; }

  @media (max-width: 760px) {
    .steps { grid-template-columns: 1fr; gap: 40px; }
    .step { border-left: none; padding: 0; }
    .moments { flex-direction: column; align-items: flex-start; }
    .moments .timer { text-align: left; }
    header.top .tagline { display: none; }
  }
  @media (max-width: 560px) {
    .brand .tld { display: none; }
    .header-right { gap: 12px; }
    footer.bottom { flex-direction: column; align-items: flex-start; gap: 16px; padding: 28px 0; }
    .footer-links { gap: 12px 16px; }
    .mono { letter-spacing: 0.16em; }
  }
  @media (max-width: 360px) {
    .wrap { padding: 0 16px; }
    .mono { letter-spacing: 0.14em; }
    h1 { font-size: 1.7rem; }
    .moments { padding: 26px; }
    form.waitlist-form button { padding: 0 18px; }
  }
</style>
</head>
<body>
<div class="splash" id="splash" aria-hidden="true">
  <div class="disc"></div>
  <div class="bm">
    <svg class="s-logo" viewBox="0 0 96 96">
      <circle cx="48" cy="48" r="46" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <g transform="translate(16.3,16.8) scale(0.88)">
        <rect x="50" y="10" width="7" height="14" rx="2" fill="currentColor"/>
        <path d="M36 4 L64 28 V57 H32 L20 67 V57 H8 V28 Z" fill="currentColor" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
        <rect x="22" y="32" width="18" height="5" rx="2.5" style="fill:var(--bg)"/>
        <rect x="22" y="43" width="27" height="5" rx="2.5" style="fill:var(--bg)"/>
      </g>
    </svg>
    <div class="s-name">Neighbro</div>
    <div class="s-by">by <b>PSYTICAN</b></div>
  </div>
</div>

<div class="wrap">

  <header class="top">
    <div class="brand">
      <button class="mark" id="logoBtn" aria-label="Change accent">
        <svg width="34" height="34" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="46" fill="none" stroke="currentColor" stroke-width="2.5"/>
          <g transform="translate(16.3,16.8) scale(0.88)">
            <rect x="50" y="10" width="7" height="14" rx="2" fill="currentColor"/>
            <path d="M36 4 L64 28 V57 H32 L20 67 V57 H8 V28 Z" fill="currentColor" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
            <rect x="22" y="32" width="18" height="5" rx="2.5" style="fill:var(--bg)"/>
            <rect x="22" y="43" width="27" height="5" rx="2.5" style="fill:var(--bg)"/>
          </g>
        </svg>
      </button>
      <span class="name">NEIGHBRO<span class="tld">.PLACE</span></span>
    </div>
    <div class="header-right">
      <div class="tagline mono" data-i18n="headerStatus"></div>

  const ERR_ENDPOINT = (() => {
    try { return "https://" + JSON.parse(atob(SUPABASE_ANON_KEY.split(".")[1])).ref + ".supabase.co/rest/v1/client_errors"; }
    catch (e) { return ""; }

  function currentEnv() {
    const h = location.hostname;
    if (h.startsWith("dev.") || h.includes("-dev")) return "dev";

    if (h === "neighbro.place" || h.endsWith(".neighbro.place")) return "prod";

  function logClientError(kind, err, extra) {
    if (!ERR_ENDPOINT || !SUPABASE_ANON_KEY) return;
    try {

      statusErr: "No se pudo enviar. Inténtalo de nuevo en un momento.",
      feedTitle: "Feed del vecindario",
      m1: "¿Alguien para un espresso antes del trabajo?",
      m2: "Busco pareja de tenis este fin de semana 🎾",
      m3: "Vino en mi terraza esta noche, somos dos — ¿te unes?",
      m4: "Acabo de mudarme al 4º. Pasad a saludar 👋",
      featEyebrow: "Por qué se siente distinto",
      footerTerms: "Términos", footerPrivacy: "Privacidad", footerRules: "Reglas",
      f1t: "Por zona, no por metros", f1d: "Te conectamos por la zona que eliges — nunca por tu ubicación exacta.",
      f2t: "Únete o pasa", f2d: "Desliza a la derecha para unirte, a la izquierda para pasar. Sin feed infinito.",

      f4t: "Juegos, sin reglas", f4d: "Dominó, damas, ajedrez — sin reglas fijas, las inventáis vosotros.",
    },
    el: {
      headerStatus: "Με πρόσκληση · Σύντομα", eyebrow: "Η τέχνη του να είσαι κοντά",
      h1a: "Καλοί γείτονες.", h1b: "Αληθινές στιγμές.",
      sub: "Γνώρισε ενδιαφέροντες ανθρώπους που ζουν κοντά σου. Πες κάτι, ταίριαξε, μίλα — και άφησέ το να σβήσει. Χωρίς προφίλ. Χωρίς ροή. Χωρίς θόρυβο.",
      emailPlaceholder: "το email σου", cta: "Ζήτησε πρόσβαση",
      note: "Τα πρώτα μέλη αποκτούν το status του ιδρυτή",
      s1k: "I — Πες", s1t: "Τα λόγια σου φτάνουν στη γειτονιά", s1d: "Μια σύντομη γραμμή πάει σε ανθρώπους κοντά σου. Ήσυχα, τοπικά, στη στιγμή.",
      s2k: "II — Ταίριασμα", s2t: "Ένα αμοιβαίο like ανοίγει την πόρτα", s2d: "Ένα ιδιωτικό chat εμφανίζεται μόνο όταν το θέλετε και οι δύο. Η προσοχή σου προστατεύεται.",
      s3k: "III — Σβήσε", s3t: "Τίποτα δεν μένει για πάντα", s3d: "Κάθε μήνυμα διαλύεται μετά από λίγες ώρες. Μένουν οι άνθρωποι που γνώρισες.",
      momentsLabel: "Στιγμές", tag1: "παρέα για πρωινό espresso", tag2: "παρτενέρ για τένις", tag3: "κρασί στη βεράντα", tag4: "νέος στην πόλη",
      timerCap: "Μετά χάνεται", closeA: "Η γειτονιά", closeB: "περιμένει",
      footerCopy: "© 2026 Neighbro.place",
      afterTitle: "Είσαι στη λίστα.", afterSub: "Θα σου πούμε μόλις ανοίξει η γειτονιά.",
      alphaBtn: "Μπες στην alpha →", notifyBtn: "Ειδοποίησέ με στο λανσάρισμα", notifyDone: "Θα ειδοποιηθείς",
      statusErr: "Η αποστολή απέτυχε. Δοκίμασε ξανά σε λίγο.",
      feedTitle: "Ροή γειτονιάς",
      m1: "Κανείς για πρωινό espresso πριν τη δουλειά;",
      m2: "Ψάχνω παρτενέρ για τένις το Σαββατοκύριακο 🎾",
      m3: "Κρασί στη βεράντα μου απόψε, είμαστε δύο — έρχεσαι;",
      m4: "Μόλις μετακόμισα στον 4ο. Πείτε ένα γεια 👋",
      featEyebrow: "Γιατί μοιάζει διαφορετικό",
      footerTerms: "Όροι", footerPrivacy: "Απόρρητο", footerRules: "Κανόνες",
      f1t: "Ανά περιοχή, όχι ανά μέτρο", f1d: "Σε συνδέουμε με την περιοχή που διαλέγεις — ποτέ με την ακριβή θέση σου.",
      f2t: "Μπες ή προσπέρνα", f2d: "Σύρε δεξιά για να μπεις, αριστερά για να προσπεράσεις. Χωρίς ατέλειωτη ροή.",
      f3t: "Δες γιατί ταιριάξατε", f3d: "Όταν το like είναι αμοιβαίο, βλέπεις τις γραμμές που σας έφεραν κοντά.",
      f4t: "Παιχνίδια, χωρίς κανόνες", f4d: "Ντόμινο, ντάμα, σκάκι — χωρίς έτοιμους κανόνες, τους εφευρίσκετε.",
    },
  };
  const SUPPORTED = Object.keys(T);
  let LANG = "en";

  function detectLang() {
    const stored = localStorage.getItem("lang");
    if (stored && SUPPORTED.includes(stored)) return stored;
    const nav = (navigator.language || "en").slice(0, 2).toLowerCase();
    return SUPPORTED.includes(nav) ? nav : "en";
  }

  function applyLang(lang, persist) {
    LANG = SUPPORTED.includes(lang) ? lang : "en";
    const d = T[LANG];
    document.documentElement.lang = LANG;
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const v = d[el.getAttribute("data-i18n")];
      if (v != null) el.textContent = v;
    });
    document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
      const v = d[el.getAttribute("data-i18n-ph")];
      // Also expose it as the accessible name — the input has no visible label.
      if (v != null) { el.setAttribute("placeholder", v); el.setAttribute("aria-label", v); }
    });
    document.getElementById("lang-select").value = LANG;
    if (persist) localStorage.setItem("lang", LANG); // remember only a manual choice
  }

  // Auto: follow the browser default until the user picks a language themselves.
  applyLang(detectLang(), false);
  document.getElementById("lang-select").addEventListener("change", (e) => applyLang(e.target.value, true));

  // Theme — already resolved before paint by the head script; here we only wire the toggles.
  // Accent: random per session until the user picks one (logo click), then their choice sticks.
  const ACCENTS = (window.__nb && window.__nb.ACC) || ["", "crimson", "teal", "azure", "violet"];
  let accentIndex = (window.__nb && window.__nb.accentIndex) || 0;
  function applyAccent(i, persist) {
    accentIndex = ((i % ACCENTS.length) + ACCENTS.length) % ACCENTS.length;
    const id = ACCENTS[accentIndex];
    if (id) document.documentElement.dataset.theme = id; else delete document.documentElement.dataset.theme;
    sessionStorage.setItem("nb-accent-active", String(accentIndex));
    if (persist) localStorage.setItem("nb-accent", String(accentIndex)); // becomes the fixed choice
  }
  document.getElementById("logoBtn").addEventListener("click", () => applyAccent(accentIndex + 1, true));

  // Light/dark: default from the OS (applied in head); persist only a manual toggle.
  function applyMode(m, persist) {
    if (m === "light") document.documentElement.dataset.mode = "light"; else delete document.documentElement.dataset.mode;
    const tc = document.querySelector('meta[name="theme-color"]');
    if (tc) tc.setAttribute("content", m === "light" ? "#e9e6dd" : "#0c0b09");
    if (persist) localStorage.setItem("nb-mode", m);
  }
  document.getElementById("modeBtn").addEventListener("click", () => applyMode(document.documentElement.dataset.mode === "light" ? "dark" : "light", true));

  // Splash — hold briefly on the first view of a session, then wipe. Repeat
  // views and reduced-motion skip the hold so content paints immediately (LCP).
  const splash = document.getElementById("splash");
  if (splash) {
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const seen = sessionStorage.getItem("nb-splash-seen");
    sessionStorage.setItem("nb-splash-seen", "1");
    const hold = reduce || seen ? 0 : 1400;
    setTimeout(() => {
      splash.classList.add("done");
      setTimeout(() => splash.remove(), reduce ? 0 : 500);
    }, hold);
  }

  function showAfter(formId) {
    const after = document.querySelector(`[data-after-for="${formId}"]`);
    if (!after) return;
    const alpha = after.querySelector("[data-alpha]");
    if (CFG.alphaUrl) { alpha.href = CFG.alphaUrl; alpha.hidden = false; }
    if (CFG.vapidPublicKey) after.querySelector("[data-notify]").hidden = false;
    after.classList.add("show");
  }

  async function subscribePush(btn) {
    const original = btn.textContent;
    // Give the user feedback instead of silently doing nothing on failure.
    const fail = (msg) => { btn.textContent = msg; btn.disabled = false; };
    try {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) { fail("Not supported here"); return; }
      if ((await Notification.requestPermission()) !== "granted") { fail("Notifications are blocked"); return; }
      btn.disabled = true;
      btn.textContent = original;
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: CFG.vapidPublicKey });
      const j = sub.toJSON();
      const res = await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions`, {
        method: "POST",
        headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, Prefer: "return=minimal" },
        body: JSON.stringify({ endpoint: j.endpoint, p256dh: j.keys.p256dh, auth: j.keys.auth, source: SOURCE, lang: LANG }),
      });
      if (!res.ok) throw new Error("save failed"); // don't swallow a backend failure
      btn.textContent = T[LANG].notifyDone;
      btn.disabled = true;
    } catch (e) {
      fail("Couldn't set that up — try again");
    }
  }

  document.querySelectorAll(".waitlist-form").forEach((form) => {
    const status = document.querySelector(`[data-status-for="${form.id}"]`);
    const btn = form.querySelector("button");
    const after = document.querySelector(`[data-after-for="${form.id}"]`);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = form.querySelector('input[type="email"]').value.trim();
      if (!email) return;
      btn.disabled = true;
      status.textContent = "";
      status.className = "status";
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
          method: "POST",
          headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, Prefer: "return=minimal" },
          body: JSON.stringify({ email, source: SOURCE, early_access: true }),
        });
        // 409 = unique violation: the email is already on the list. That's a
        // returning visitor, not a failure — show the same success state.
        if (!res.ok && res.status !== 409) throw new Error("HTTP " + res.status);
        form.style.display = "none";
        showAfter(form.id);
      } catch (err) {
        logClientError("waitlist-submit", err, { target: SUPABASE_URL + "/rest/v1/" + TABLE });
        // Surface the real reason (network / TLS / CORS / HTTP code) — helps debugging on mobile.
        const why = (err && (err.message || err.name)) || "network";
        status.textContent = T[LANG].statusErr + " [" + why + "]";
        status.className = "status err";
        btn.disabled = false;
      }
    });

    if (after) {
      const notify = after.querySelector("[data-notify]");
      notify && notify.addEventListener("click", () => subscribePush(notify));
    }
  });
</script>
